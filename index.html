<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuaRip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f0e;
      --surface: #141715;
      --border:  #1f2420;
      --accent:  #39e87b;
      --accent2: #e8a239;
      --danger:  #e84039;
      --muted:   #3a4040;
      --text:    #c8d4c8;
      --dim:     #5a6860;
      --mono:    'Share Tech Mono', monospace;
      --sans:    'Barlow Condensed', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; line-height: 1.4; }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; max-width: 960px; margin: 0 auto; padding: 0 20px 40px; }

    header { padding: 28px 0 20px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 18px; }
    header h1 { font-family: var(--sans); font-weight: 700; font-size: 2rem; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); }
    header .sub { font-family: var(--mono); font-size: .7rem; color: var(--dim); letter-spacing: .06em; }
    .status-pill { margin-left: auto; font-family: var(--mono); font-size: .65rem; padding: 4px 10px; border-radius: 2px; border: 1px solid var(--muted); color: var(--dim); letter-spacing: .1em; transition: all .3s; }
    .status-pill.running { border-color: var(--accent); color: var(--accent); }
    .status-pill.done    { border-color: #39e87b80; color: var(--accent); }
    .status-pill.error   { border-color: var(--danger); color: var(--danger); }

    main { display: grid; grid-template-columns: 320px 1fr; gap: 24px; padding-top: 24px; align-items: start; }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } }

    .panel { background: var(--surface); border: 1px solid var(--border); }
    .panel-head { padding: 10px 16px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: .65rem; letter-spacing: .15em; color: var(--dim); text-transform: uppercase; }
    .panel-body { padding: 18px 16px; }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: .75rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }

    .seg { display: flex; gap: 1px; }
    .seg input { position: absolute; opacity: 0; pointer-events: none; }
    .seg-btn { flex: 1; padding: 7px 0; text-align: center; font-family: var(--mono); font-size: .7rem; letter-spacing: .08em; background: var(--bg); border: 1px solid var(--muted); color: var(--dim); cursor: pointer; transition: all .15s; user-select: none; }
    .seg input:checked + .seg-btn { background: var(--accent); border-color: var(--accent); color: #000; }

    input[type="text"], input[type="number"] { width: 100%; background: var(--bg); border: 1px solid var(--muted); color: var(--text); font-family: var(--mono); font-size: .8rem; padding: 8px 10px; outline: none; transition: border-color .15s; }
    input[type="text"]:focus, input[type="number"]:focus { border-color: var(--accent); }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    #tv-fields { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .4s ease, opacity .3s ease; }
    #tv-fields.open { max-height: 400px; opacity: 1; }

    .btn-row { display: flex; gap: 8px; margin-top: 22px; }
    button { flex: 1; padding: 11px 0; font-family: var(--sans); font-weight: 700; font-size: .9rem; letter-spacing: .1em; text-transform: uppercase; border: none; cursor: pointer; transition: opacity .15s, filter .15s; }
    button:disabled { opacity: .35; cursor: default; }
    #btn-start { background: var(--accent); color: #000; }
    #btn-start:hover:not(:disabled) { filter: brightness(1.15); }
    #btn-stop { background: transparent; border: 1px solid var(--danger); color: var(--danger); flex: 0 0 auto; width: 80px; }
    #btn-stop:hover:not(:disabled) { background: var(--danger); color: #fff; }

    .log-wrap { display: flex; flex-direction: column; height: 580px; }
    .log-head { display: flex; align-items: center; gap: 10px; }
    .log-head .spacer { flex: 1; }
    .log-clear { font-family: var(--mono); font-size: .6rem; letter-spacing: .1em; color: var(--dim); background: none; border: 1px solid var(--border); padding: 3px 8px; cursor: pointer; flex: none; width: auto; text-transform: uppercase; }
    .log-clear:hover { color: var(--text); border-color: var(--muted); }

    #progress-section { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .4s ease, opacity .3s ease; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    #progress-section.open { max-height: 110px; opacity: 1; }
    .progress-inner { padding: 10px 14px 12px; border-bottom: 1px solid var(--border); }

    #domino-display { font-family: var(--mono); font-size: .75rem; letter-spacing: .18em; color: var(--accent); margin-bottom: 9px; height: 1.2em; white-space: pre; text-shadow: 0 0 8px rgba(57,232,123,0.4); }

    .pbar-track { width: 100%; height: 6px; background: var(--border); position: relative; margin-bottom: 7px; overflow: hidden; }
    .pbar-fill { height: 100%; background: var(--accent); width: 0%; transition: width .6s ease; box-shadow: 0 0 10px rgba(57,232,123,0.5); }
    .pbar-fill.indeterminate { animation: slide-bar 1.6s ease-in-out infinite; }
    @keyframes slide-bar { 0% { margin-left: 0%; width: 25%; } 50% { margin-left: 70%; width: 15%; } 100% { margin-left: 0%; width: 25%; } }

    .pbar-stats { font-family: var(--mono); font-size: .62rem; color: var(--dim); letter-spacing: .06em; display: flex; gap: 18px; }
    .pbar-stats .val { color: var(--accent2); }

    #log { flex: 1; overflow-y: auto; padding: 14px; font-family: var(--mono); font-size: .72rem; line-height: 1.7; color: #8fa898; background: var(--bg); border: 1px solid var(--border); border-top: none; word-break: break-all; scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }
    .log-line        { display: block; }
    .log-line.ok     { color: var(--accent); }
    .log-line.warn   { color: var(--accent2); }
    .log-line.err    { color: var(--danger); }
    .log-line.info   { color: #6ab0d4; }
    .log-line.dim    { color: var(--dim); }
    .log-line.done   { color: var(--accent); font-weight: bold; }
    .log-placeholder { color: var(--muted); font-size: .68rem; letter-spacing: .05em; }

    .cursor { display: inline-block; width: 7px; height: .85em; background: var(--accent); vertical-align: text-bottom; animation: blink .9s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>SuaRip</h1>
    <span class="sub">v1.9.5-beta // shut up and rip</span>
    <span class="status-pill" id="pill">IDLE</span>
  </header>

  <main>
    <!-- Config panel -->
    <div class="panel">
      <div class="panel-head">// config</div>
      <div class="panel-body">

        <div class="field">
          <label>Drive</label>
          <div class="seg">
            <input type="radio" name="drive" id="d-int" value="internal" checked>
            <label class="seg-btn" for="d-int">Internal (/dev/sr0)</label>
            <input type="radio" name="drive" id="d-usb" value="usb">
            <label class="seg-btn" for="d-usb">USB (/dev/sr1)</label>
          </div>
        </div>

        <div class="field">
          <label>Content Type</label>
          <div class="seg">
            <input type="radio" name="type" id="t-movie" value="movie" checked>
            <label class="seg-btn" for="t-movie">Movie</label>
            <input type="radio" name="type" id="t-tv" value="tv">
            <label class="seg-btn" for="t-tv">TV Series</label>
          </div>
        </div>

        <!-- TV-only fields: slide open when TV is selected -->
        <div id="tv-fields">
          <div class="field">
            <label>Series Name</label>
            <input type="text" id="series-name" placeholder="e.g. Breaking Bad">
          </div>
          <div class="row-2">
            <div class="field">
              <label>Season #</label>
              <input type="number" id="season" value="1" min="1" max="99">
            </div>
            <div class="field">
              <label>First Episode #</label>
              <input type="number" id="ep-start" value="1" min="1" max="999">
            </div>
          </div>
        </div>

        <div class="field">
          <label>Rip Mode</label>
          <div class="seg">
            <input type="radio" name="rescue" id="r-normal" value="false" checked>
            <label class="seg-btn" for="r-normal">Normal (MakeMKV)</label>
            <input type="radio" name="rescue" id="r-rescue" value="true">
            <label class="seg-btn" for="r-rescue">Rescue (ddrescue)</label>
          </div>
        </div>

        <div class="btn-row">
          <button id="btn-start">&#9654; Start Rip</button>
          <button id="btn-stop" disabled>&#9632; Stop</button>
        </div>
      </div>
    </div>

    <!-- Log panel -->
    <div class="panel log-wrap">
      <div class="panel-head log-head">
        <span>// output</span>
        <span class="spacer"></span>
        <button class="log-clear" id="btn-clear">clear</button>
      </div>

      <!-- Progress + domino: slides in when HandBrake encoding begins -->
      <div id="progress-section">
        <div class="progress-inner">
          <div id="domino-display">| | | | | | | | | | | | | | | |</div>
          <div class="pbar-track">
            <div class="pbar-fill indeterminate" id="pbar-fill"></div>
          </div>
          <div class="pbar-stats">
            <span>ENCODE</span>
            <span id="stat-pct">--%</span>
            <span>FPS <span class="val" id="stat-fps">--</span></span>
            <span>ETA <span class="val" id="stat-eta">--</span></span>
          </div>
        </div>
      </div>

      <div id="log"><span class="log-placeholder">Waiting for job to start...</span></div>
    </div>
  </main>
</div>

<script>
  // ── Element refs ────────────────────────────────────────────────────────
  const pill            = document.getElementById('pill');
  const logEl           = document.getElementById('log');
  const btnStart        = document.getElementById('btn-start');
  const btnStop         = document.getElementById('btn-stop');
  const btnClear        = document.getElementById('btn-clear');
  const tvFields        = document.getElementById('tv-fields');
  const progressSection = document.getElementById('progress-section');
  const pbarFill        = document.getElementById('pbar-fill');
  const statPct         = document.getElementById('stat-pct');
  const statFps         = document.getElementById('stat-fps');
  const statEta         = document.getElementById('stat-eta');
  const dominoDisplay   = document.getElementById('domino-display');

  let sse = null;
  let running = false;
  let hadError = false;

  // ── TV fields toggle ────────────────────────────────────────────────────
  // Attach to the label clicks directly — avoids any radio event quirkiness
  document.getElementById('t-tv').addEventListener('change', function() {
    tvFields.classList.add('open');
  });
  document.getElementById('t-movie').addEventListener('change', function() {
    tvFields.classList.remove('open');
  });

  // ── Domino animation ────────────────────────────────────────────────────
  const DOMINO_COUNT = 16;
  const FRAMES = [];
  for (let tip = 0; tip <= DOMINO_COUNT; tip++) {
    var cols = [];
    for (var i = 0; i < DOMINO_COUNT; i++) {
      if (i < tip - 1)        cols.push('_');
      else if (i === tip - 1) cols.push('/');
      else                    cols.push('|');
    }
    FRAMES.push(cols.join(' '));
  }
  FRAMES.push(FRAMES[FRAMES.length - 1]); // hold fallen frame
  FRAMES.push(FRAMES[FRAMES.length - 1]);

  var dominoFrame = 0;
  var dominoTimer = null;

  function startDomino() {
    if (dominoTimer) return;
    dominoFrame = 0;
    dominoTimer = setInterval(function() {
      dominoDisplay.textContent = FRAMES[dominoFrame];
      dominoFrame = (dominoFrame + 1) % FRAMES.length;
    }, 110);
  }

  function stopDomino() {
    clearInterval(dominoTimer);
    dominoTimer = null;
    dominoDisplay.textContent = '_ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _';
  }

  // ── Progress ────────────────────────────────────────────────────────────
  function showProgress(pct, fps, eta) {
    if (!progressSection.classList.contains('open')) {
      progressSection.classList.add('open');
      pbarFill.classList.remove('indeterminate');
      startDomino();
    }
    pbarFill.style.width = pct + '%';
    statPct.textContent  = pct + '%';
    statFps.textContent  = fps;
    statEta.textContent  = eta;
  }

  function hideProgress() {
    progressSection.classList.remove('open');
    pbarFill.classList.add('indeterminate');
    pbarFill.style.width = '0%';
    statPct.textContent  = '--%';
    statFps.textContent  = '--';
    statEta.textContent  = '--';
    stopDomino();
  }

  // ── Log helpers ─────────────────────────────────────────────────────────
  function classifyLine(text) {
    if (/\[ERROR\]|FAILED|failed/i.test(text))    return 'err';
    if (/\[WARN\]|WARNING/i.test(text))            return 'warn';
    if (/COMPLETE|synced/i.test(text))             return 'done';
    if (/\[RIP\]|\[ENCODE\]|\[NAS\]/i.test(text)) return 'ok';
    if (/\[INFO\]/i.test(text))                    return 'info';
    if (/^:/i.test(text))                          return 'dim';
    return '';
  }

  function appendLine(text) {
    var ph = logEl.querySelector('.log-placeholder');
    if (ph) ph.remove();
    var span = document.createElement('span');
    span.className = 'log-line ' + classifyLine(text);
    span.textContent = text;
    logEl.appendChild(span);
    logEl.appendChild(document.createTextNode('\n'));
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(s) {
    pill.textContent = s.toUpperCase();
    pill.className = 'status-pill ' + s;
  }

  function setRunning(val) {
    running = val;
    btnStart.disabled = val;
    btnStop.disabled  = !val;
    setStatus(val ? 'running' : 'idle');
    var cur = logEl.querySelector('.cursor');
    if (val && !cur) {
      var c = document.createElement('span');
      c.className = 'cursor';
      logEl.appendChild(c);
    } else if (!val && cur) {
      cur.remove();
    }
    if (!val) hideProgress();
  }

  // ── SSE ─────────────────────────────────────────────────────────────────
  function openStream(jobId) {
    if (sse) sse.close();
    sse = new EventSource('/stream/' + jobId);

    sse.onmessage = function(e) {
      if (e.data === '[DONE]') {
        sse.close(); sse = null;
        setStatus(hadError ? 'error' : 'done');
        setRunning(false);
        return;
      }
      if (e.data.indexOf('__PROGRESS__:') === 0) {
        var parts = e.data.split(':');
        // parts[0]=__PROGRESS__, [1]=pct, [2]=fps, [3]=eta
        showProgress(parseFloat(parts[1]).toFixed(1), parts[2], parts[3]);
        return;
      }
      if (e.data.indexOf('[ERROR]') >= 0) hadError = true;
      appendLine(e.data);
    };

    sse.onerror = function() {
      appendLine('[STREAM ERROR] Lost connection to server.');
      sse.close();
      setRunning(false);
    };
  }

  // ── Start ───────────────────────────────────────────────────────────────
  btnStart.addEventListener('click', function() {
    var drive      = document.querySelector('input[name="drive"]:checked').value;
    var type       = document.querySelector('input[name="type"]:checked').value;
    var rescue     = document.querySelector('input[name="rescue"]:checked').value === 'true';
    var seriesName = document.getElementById('series-name').value.trim();
    var season     = parseInt(document.getElementById('season').value) || 1;
    var epStart    = parseInt(document.getElementById('ep-start').value) || 1;

    if (type === 'tv' && !seriesName) {
      appendLine('[UI] Series name is required for TV mode.');
      return;
    }

    logEl.innerHTML = '';
    hadError = false;
    hideProgress();
    setRunning(true);
    appendLine('[UI] Starting... drive=' + drive + ' type=' + type + ' rescue=' + rescue);

    fetch('/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ drive: drive, type: type, rescue: rescue,
                             series_name: seriesName, season: season, episode_start: epStart })
    })
    .then(function(res) { return res.json().then(function(d) { return { ok: res.ok, data: d }; }); })
    .then(function(r) {
      if (!r.ok) { appendLine('[ERROR] ' + (r.data.error || 'Server error')); setRunning(false); return; }
      appendLine('[UI] Job started -- id: ' + r.data.job_id);
      openStream(r.data.job_id);
    })
    .catch(function(err) {
      appendLine('[ERROR] Could not reach server: ' + err.message);
      setRunning(false);
    });
  });

  // ── Stop ────────────────────────────────────────────────────────────────
  btnStop.addEventListener('click', function() {
    if (sse) { sse.close(); sse = null; }
    fetch('/stop', { method: 'POST' }).catch(function(){});
    appendLine('[UI] Stop signal sent.');
    setRunning(false);
  });

  // ── Clear ───────────────────────────────────────────────────────────────
  btnClear.addEventListener('click', function() {
    logEl.innerHTML = '';
    if (running) {
      var c = document.createElement('span');
      c.className = 'cursor';
      logEl.appendChild(c);
    }
  });

  // ── Restore on reload ───────────────────────────────────────────────────
  fetch('/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.status === 'running' && d.job_id) {
        setRunning(true);
        appendLine('[UI] Re-attaching to running job...');
        openStream(d.job_id);
      } else if (d.status !== 'idle') {
        setStatus(d.status);
      }
    })
    .catch(function(){});
</script>
</body>
</html>
